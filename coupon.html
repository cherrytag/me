<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cherry Coupons</title>

<!-- QR Code Generator (same library used on the homepage) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cherry: #C0152A;
    --cherry-dark: #8B0D1E;
    --cherry-light: #FF3355;
    --cream: #FFF8F5;
    --ink: #1A0A0E;
    --muted: #7A6065;
    --border: #EAD9DC;
    --success: #22C55E;
    --card-bg: #FFFFFF;
    --bg: #FDF3F4;
    --shadow: 0 4px 24px rgba(192,21,42,0.10);
    --shadow-lg: 0 12px 48px rgba(192,21,42,0.16);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(192,21,42,0.07);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--cherry);
    letter-spacing: -0.3px;
  }

  .btn-back {
    background: transparent;
    color: var(--cherry);
    border: 1.5px solid var(--cherry);
    border-radius: 22px;
    padding: 7px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.18s;
  }
  .btn-back:hover { background: var(--cherry); color: #fff; }

  main {
    max-width: 440px;
    margin: 0 auto;
    padding: 28px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
  }

  .page-sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
  }

  .balance-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    align-self: flex-start;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--cherry-dark);
    box-shadow: var(--shadow);
  }

  .card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .value-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .value-btn {
    background: var(--cream);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.16s;
    font-family: 'DM Sans', sans-serif;
  }
  .value-btn .amount {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cherry);
    display: block;
  }
  .value-btn .label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    display: block;
  }
  .value-btn:hover:not(:disabled) { border-color: var(--cherry); transform: translateY(-2px); box-shadow: var(--shadow); }
  .value-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-primary {
    width: 100%;
    background: var(--cherry);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
  }
  .btn-primary:hover { background: var(--cherry-dark); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-secondary:hover { border-color: var(--cherry); color: var(--cherry); }

  .qr-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #coupon-qr-canvas {
    padding: 14px;
    background: #fff;
    border-radius: 16px;
    border: 1px solid var(--border);
  }

  .coupon-meta {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .coupon-meta strong { color: var(--ink); }

  .coupon-value-tag {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--cherry);
  }

  .btn-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .state-message {
    text-align: center;
    padding: 40px 16px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--cherry);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 13.5px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .toast.error { background: var(--cherry); }
  .toast.success { background: var(--success); }

  [hidden] { display: none !important; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <svg width="30" height="30" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 10 Q22 4 26 6" stroke="#C0152A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <circle cx="12" cy="22" r="7" fill="#C0152A" opacity="0.85"/>
      <circle cx="22" cy="22" r="7" fill="#C0152A"/>
      <circle cx="12" cy="22" r="7" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
      <circle cx="22" cy="22" r="7" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
      <circle cx="10" cy="19" r="1.8" fill="rgba(255,255,255,0.5)"/>
      <circle cx="20" cy="19" r="1.8" fill="rgba(255,255,255,0.5)"/>
    </svg>
    <span class="logo-wordmark">Cherry</span>
  </a>
  <a class="btn-back" href="index.html">← Home</a>
</header>

<main>
  <div>
    <div class="page-title">Coupons</div>
    <div class="page-sub">Download offline coupons against the earned rewards</div>
  </div>

  <div class="balance-pill" id="balance-pill">Loading balance…</div>

  <!-- ── STEP 1: choose value ──────────────────────── -->
  <div class="card" id="select-panel">
    <div class="section-label" style="margin-bottom:14px;">Choose a coupon value</div>
    <div class="value-grid" id="value-grid">
      <button class="value-btn" data-value="2.5" disabled onclick="selectValue(2.5)">
        <span class="amount">2.5</span><span class="label">points</span>
      </button>
      <button class="value-btn" data-value="5" disabled onclick="selectValue(5)">
        <span class="amount">5.0</span><span class="label">points</span>
      </button>
      <button class="value-btn" data-value="10" disabled onclick="selectValue(10)">
        <span class="amount">10.0</span><span class="label">points</span>
      </button>
    </div>
  </div>

  <!-- ── Loading state ──────────────────────────────── -->
  <div class="card state-message" id="loading-panel" hidden>
    <div class="spinner"></div>
    <div id="loading-text">Generating your coupon…</div>
  </div>

  <!-- ── STEP 2: QR coupon ──────────────────────────── -->
  <div class="card" id="coupon-panel" hidden>
    <div class="qr-wrap">
      <div class="coupon-value-tag" id="coupon-value-tag">2.5 points</div>
      <div id="coupon-qr-canvas"></div>
      <div class="coupon-meta">
        Valid for 24 hr.<br>
        Created on: <strong id="coupon-created"></strong>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="save-btn" onclick="saveCoupon()">⬇ Save Coupon</button>
        <button class="btn-secondary" onclick="shareOrCopy()">Share / Copy Link</button>
        <button class="btn-secondary" onclick="cancelCoupon()">Cancel Coupon</button>
      </div>

    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ═══ CONFIGURATION ═══════════════════════════════
const WORKER_URL = 'https://cherrytag.org/api';

const CHERRY_LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <rect width="36" height="36" fill="#ffffff"/>
  <path d="M18 10 Q22 4 26 6" stroke="#C0152A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <circle cx="12" cy="22" r="7" fill="#C0152A" opacity="0.85"/>
  <circle cx="22" cy="22" r="7" fill="#C0152A"/>
  <circle cx="12" cy="22" r="7" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
  <circle cx="22" cy="22" r="7" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
  <circle cx="10" cy="19" r="1.8" fill="rgba(255,255,255,0.5)"/>
  <circle cx="20" cy="19" r="1.8" fill="rgba(255,255,255,0.5)"/>
</svg>`;
const CHERRY_LOGO_DATA_URI = 'data:image/svg+xml;base64,' + btoa(CHERRY_LOGO_SVG);

const state = {
  userid: null,
  email: null,
  balance: 0,
  coupon: null,
};

// ═══ TOAST ════════════════════════════════════════
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ═══ WORKER HELPER ════════════════════════════════
async function workerPost(endpoint, body) {
  const res = await fetch(WORKER_URL + endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

// ═══ INIT ═════════════════════════════════════════
(async function init() {
  const params = new URLSearchParams(window.location.search);
  state.userid = params.get('userid');
  state.email  = params.get('email');

  if (!state.userid || !state.email) {
    showToast('Please sign in first', 'error');
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    return;
  }

  const { ok, data } = await workerPost('/user/get', { userid: state.userid, email: state.email });
  if (!ok || !data.user) {
    showToast('Could not load your account', 'error');
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    return;
  }

  state.balance = data.user.fund1 || 0;
  renderBalance();
})();

function renderBalance() {
  document.getElementById('balance-pill').textContent = `🍒 ${state.balance.toFixed(2)} points available`;
  document.querySelectorAll('.value-btn').forEach(btn => {
    const v = parseFloat(btn.dataset.value);
    btn.disabled = state.balance < v;
  });
}

// ═══ STEP 1 → GENERATE COUPON ═════════════════════
async function selectValue(value) {
  document.getElementById('select-panel').hidden = true;
  document.getElementById('loading-panel').hidden = false;
  document.getElementById('loading-text').textContent = 'Generating your coupon…';

  try {
    const { ok, data } = await workerPost('/coupon/generate', {
      userid: state.userid,
      email: state.email,
      value,
    });

    if (!ok || !data.ok) {
      showToast(data.error || 'Failed to generate coupon', 'error');
      document.getElementById('loading-panel').hidden = true;
      document.getElementById('select-panel').hidden = false;
      return;
    }

    state.coupon  = data.coupon;
    state.balance = data.newFund1;

    document.getElementById('loading-panel').hidden = true;
    renderCoupon();
  } catch (e) {
    showToast('Network error generating coupon', 'error');
    document.getElementById('loading-panel').hidden = true;
    document.getElementById('select-panel').hidden = false;
  }
}

// ═══ RENDER QR COUPON ═════════════════════════════
function renderCoupon() {
  const c = state.coupon;
  document.getElementById('coupon-value-tag').textContent = `${c.value.toFixed(2)} points`;
  document.getElementById('coupon-created').textContent = new Date(c.createdAt).toLocaleString();
  document.getElementById('coupon-panel').hidden = false;
  generateCouponQR(c.qrText);
}

function generateCouponQR(qrText) {
  const container = document.getElementById('coupon-qr-canvas');
  container.innerHTML = '';

  // Render the raw QR into a temporary off-screen div first
  const tempDiv = document.createElement('div');
  document.body.appendChild(tempDiv);

  new QRCode(tempDiv, {
    text: qrText,
    width: 220,
    height: 220,
    colorDark: '#1A0A0E',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.H, // high error correction so the center logo doesn't break scanning
  });

  function buildComposite() {
    const qrCanvas = tempDiv.querySelector('canvas');
    if (!qrCanvas) { requestAnimationFrame(buildComposite); return; }

    // ── Draw logo overlay on the raw QR ──

    const ctx      = canvas.getContext('2d');
    const logoSize = canvas.width * 0.26;
    const x        = (canvas.width  - logoSize) / 2;
    const y        = (canvas.height - logoSize) / 2;
    const pad      = 6;

    // White backing square
    ctx.fillStyle = '#FFFFFF';
    roundRect(ctx, x - pad, y - pad, logoSize + pad * 2, logoSize + pad * 2, 10);
    ctx.fill();

    // Draw logo — wait for it to load before painting
    const logo   = new Image();
    logo.onload  = () => {
      ctx.drawImage(logo, x, y, logoSize, logoSize);
      finishComposite(qrCanvas);   // proceed only after logo is painted
    };

    logo.onerror = () => finishComposite(qrCanvas);  // continue without logo
    logo.src     = CHERRY_LOGO_DATA_URI;
  }

  function finishComposite(qrCanvas) {
    // ── Build the same branded card that saveCoupon() produces ──
    const PAD  = 28;
    const W    = qrCanvas.width + PAD * 2;
    const QR_Y = 110;
    const BOT  = QR_Y + qrCanvas.height + 20;
    const H    = BOT + 70;

    const composite = document.createElement('canvas');
    composite.width  = W;
    composite.height = H;
    const ctx = composite.getContext('2d');

    // Background
    ctx.fillStyle = '#FFF8F5';
    ctx.fillRect(0, 0, W, H);

    // Red header bar
    ctx.fillStyle = '#C0152A';
    ctx.fillRect(0, 0, W, 80);

    // "Cherry Coupon" title
    ctx.fillStyle  = '#FFFFFF';
    ctx.font       = 'bold 22px serif';
    ctx.textAlign  = 'center';
    ctx.fillText('Cherry Coupon', W / 2, 34);

    // Points value
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(`${state.coupon.value.toFixed(2)} points`, W / 2, 62);

    // QR image
    ctx.drawImage(qrCanvas, PAD, QR_Y);

    // "Valid for 24 hours"
    ctx.fillStyle = '#1A0A0E';
    ctx.font      = '500 14px sans-serif';
    ctx.fillText('Valid for 24 hours', W / 2, BOT + 24);

    // Created date
    ctx.fillStyle = '#7A6065';
    ctx.font      = '13px sans-serif';
    ctx.fillText('Created: ' + new Date(state.coupon.createdAt).toLocaleString(), W / 2, BOT + 46);

    // ── Mount into the visible container ──
    container.appendChild(composite);
    document.body.removeChild(tempDiv);   // clean up temp node
  }

  requestAnimationFrame(buildComposite);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ═══ DOWNLOAD ═════════════════════════════════════
// ═══ PLATFORM DETECTION ═══════════════════════════════
function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
function isAndroid() {
  return /Android/.test(navigator.userAgent);
}

// ═══ SAVE COUPON (platform-aware) ═════════════════════
async function saveCoupon() {
  const qrCanvas = document.querySelector('#coupon-qr-canvas canvas');
  if (!qrCanvas) { showToast('QR not ready yet', 'error'); return; }

  // ── Build a composite canvas ──────────────────────────────────────────────
  const PAD   = 28;
  const W     = qrCanvas.width + PAD * 2;          // match QR width + padding
  const QR_Y  = 110;                                // top of QR block
  const BOT   = QR_Y + qrCanvas.height + 20;       // bottom of QR block
  const H     = BOT + 70;                           // extra space for text below

  const out = document.createElement('canvas');
  out.width  = W;
  out.height = H;
  const ctx = out.getContext('2d');

  // Background
  ctx.fillStyle = '#FFF8F5';
  ctx.fillRect(0, 0, W, H);

  // Red header bar
  ctx.fillStyle = '#C0152A';
  ctx.fillRect(0, 0, W, 80);

  // Header text — "Cherry Coupon"
  ctx.fillStyle = '#FFFFFF';
  ctx.font      = 'bold 22px serif';
  ctx.textAlign = 'center';
  ctx.fillText('Cherry Coupon', W / 2, 34);

  // Points value under header text
  ctx.font      = 'bold 18px sans-serif';
  ctx.fillText(`${state.coupon.value.toFixed(2)} points`, W / 2, 62);

  // QR code image
  ctx.drawImage(qrCanvas, PAD, QR_Y);

  // "Valid for 24 hours"
  ctx.fillStyle = '#1A0A0E';
  ctx.font      = '500 14px sans-serif';
  ctx.fillText('Valid for 24 hours', W / 2, BOT + 24);

  // Created date
  ctx.fillStyle = '#7A6065';
  ctx.font      = '13px sans-serif';
  ctx.fillText('Created: ' + new Date(state.coupon.createdAt).toLocaleString(), W / 2, BOT + 46);

  // ── Export the composite ──────────────────────────────────────────────────
  out.toBlob(async (blob) => {
    const file = new File([blob], `cherry-coupon-${state.coupon.idCouponToken}.png`, { type: 'image/png' });

    // ── Option A: Web Share API (iOS Safari 15+, Android Chrome) ──────────
    // This triggers the native share sheet: user can choose Photos, Files, etc.
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'Cherry Coupon',
          text: `Cherry ${state.coupon.value.toFixed(2)} point coupon`,
        });
        showToast('Coupon shared/saved!', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        return;
      } catch (e) {
        if (e.name !== 'AbortError') {
          // Fall through to next method if share fails (not user cancel)
        } else {
          return; // User cancelled — don't redirect
        }
      }
    }

    // ── Option B: iOS fallback — open image in new tab with instructions ───
    if (isIOS()) {
      const url = URL.createObjectURL(blob);
      showSaveInstructions('ios', url);
      return;
    }

    // ── Option C: Android fallback — standard download ─────────────────────
    if (isAndroid()) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `cherry-coupon-${state.coupon.idCouponToken}.png`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
      showToast('Coupon saved to Downloads', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 1200);
      return;
    }

    // ── Option D: Desktop fallback ─────────────────────────────────────────
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = `cherry-coupon-${state.coupon.idCouponToken}.png`;
    link.href = url;
    link.click();
    URL.revokeObjectURL(url);
    showToast('Coupon downloaded', 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
  }, 'image/png');
}

// ═══ iOS INSTRUCTIONS OVERLAY ══════════════════════════
function showSaveInstructions(platform, blobUrl) {
  // Open image in new tab — on iOS, user can long-press → Save to Photos
  const win = window.open(blobUrl, '_blank');
  if (!win) {
    // Popup blocked — show inline instructions instead
    showToast('Long-press the QR image above → Save to Photos', '');
  } else {
    showToast('Tap & hold the image → Save to Photos', 'success');
  }
}

// ═══ SHARE / COPY (secondary button) ══════════════════
async function shareOrCopy() {
  const qrCanvas = document.querySelector('#coupon-qr-canvas canvas');
  if (!qrCanvas) { showToast('QR not ready yet', 'error'); return; }

  // ── Build a composite canvas ──────────────────────────────────────────────
  const PAD   = 28;
  const W     = qrCanvas.width + PAD * 2;          // match QR width + padding
  const QR_Y  = 110;                                // top of QR block
  const BOT   = QR_Y + qrCanvas.height + 20;       // bottom of QR block
  const H     = BOT + 70;                           // extra space for text below

  const out = document.createElement('canvas');
  out.width  = W;
  out.height = H;
  const ctx = out.getContext('2d');

  // Background
  ctx.fillStyle = '#FFF8F5';
  ctx.fillRect(0, 0, W, H);

  // Red header bar
  ctx.fillStyle = '#C0152A';
  ctx.fillRect(0, 0, W, 80);

  // Header text — "Cherry Coupon"
  ctx.fillStyle = '#FFFFFF';
  ctx.font      = 'bold 22px serif';
  ctx.textAlign = 'center';
  ctx.fillText('Cherry Coupon', W / 2, 34);

  // Points value under header text
  ctx.font      = 'bold 18px sans-serif';
  ctx.fillText(`${state.coupon.value.toFixed(2)} points`, W / 2, 62);

  // QR code image
  ctx.drawImage(qrCanvas, PAD, QR_Y);

  // "Valid for 24 hours"
  ctx.fillStyle = '#1A0A0E';
  ctx.font      = '500 14px sans-serif';
  ctx.fillText('Valid for 24 hours', W / 2, BOT + 24);

  // Created date
  ctx.fillStyle = '#7A6065';
  ctx.font      = '13px sans-serif';
  ctx.fillText('Created: ' + new Date(state.coupon.createdAt).toLocaleString(), W / 2, BOT + 46);

  // ── Export the composite ──────────────────────────────────────────────────

  out.toBlob(async (blob) => {
    const file = new File([blob], `cherry-coupon-${state.coupon.idCouponToken}.png`, { type: 'image/png' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Cherry Coupon' });
        return;
      } catch (e) { /* fall through */ }
    }

    // Fallback: copy image to clipboard
    try {
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
      showToast('Coupon image copied to clipboard', 'success');
    } catch {
      showToast('Use the Save button to download', '');
    }
  }, 'image/png');
}

// ═══ CANCEL ═══════════════════════════════════════
async function cancelCoupon() {
  if (!state.coupon) return;

  document.getElementById('coupon-panel').hidden = true;
  document.getElementById('loading-panel').hidden = false;
  document.getElementById('loading-text').textContent = 'Cancelling coupon…';

  try {
    const { ok, data } = await workerPost('/coupon/cancel', {
      userid: state.userid,
      email: state.email,
      idCouponToken: state.coupon.idCouponToken,
      value: state.coupon.value,
    });

    if (!ok || !data.ok) {
      showToast(data.error || 'Failed to cancel coupon', 'error');
      document.getElementById('loading-panel').hidden = true;
      document.getElementById('coupon-panel').hidden = false;
      return;
    }

    showToast('Coupon cancelled — points refunded', 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 1000);
  } catch (e) {
    showToast('Network error cancelling coupon', 'error');
    document.getElementById('loading-panel').hidden = true;
    document.getElementById('coupon-panel').hidden = false;
  }
}
</script>
